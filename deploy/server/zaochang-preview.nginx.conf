server {
    listen 80;
    listen [::]:80;
    server_name aetherstudio.top www.aetherstudio.top;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aetherstudio.top www.aetherstudio.top;

    ssl_certificate /etc/letsencrypt/live/aetherstudio.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aetherstudio.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 11m;

    # HTTP/2 counts each concurrent static fetch against limit_conn. Keep the
    # request-rate guard while allowing trusted build asset graphs to load.
    location ~ ^/(?:assets/|product-apps/|favicon\.svg$) {
        auth_basic "Zaochang protected preview";
        auth_basic_user_file /etc/nginx/.htpasswd-zaochang;
        limit_req zone=zaochang_preview_per_ip burst=100 nodelay;
        limit_conn zaochang_preview_connections 128;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        auth_basic "Zaochang protected preview";
        auth_basic_user_file /etc/nginx/.htpasswd-zaochang;
        limit_req zone=zaochang_preview_per_ip burst=100 nodelay;
        limit_conn zaochang_preview_connections 30;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
