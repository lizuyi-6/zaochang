map $uri $zaochang_product_permissions_policy {
    default "camera=(), microphone=(), payment=(), geolocation=()";
    ~^/product-apps/wander/ "camera=(), microphone=(), payment=(), geolocation=(self)";
}

server {
    listen 80;
    listen [::]:80;
    server_name aetherstudio.top www.aetherstudio.top;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aetherstudio.top www.aetherstudio.top;

    ssl_certificate /etc/letsencrypt/live/aetherstudio.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aetherstudio.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 11m;

    # Versioned build assets are immutable files. Serve them from the atomic
    # current release instead of consuming a Workerd request for every module.
    location ^~ /assets/ {
        auth_basic "Zaochang protected preview";
        auth_basic_user_file /etc/nginx/.htpasswd-zaochang;
        limit_req zone=zaochang_preview_static_per_ip burst=160 nodelay;
        limit_conn zaochang_preview_connections 128;

        root /opt/zaochang/current/dist/client;
        try_files $uri =404;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Embedded product applications remain same-origin and keep the exact
    # security boundary previously emitted by the Worker _headers manifest.
    location ^~ /product-apps/ {
        auth_basic "Zaochang protected preview";
        auth_basic_user_file /etc/nginx/.htpasswd-zaochang;
        limit_req zone=zaochang_preview_static_per_ip burst=160 nodelay;
        limit_conn zaochang_preview_connections 128;

        root /opt/zaochang/current/dist/client;
        index index.html;
        try_files $uri $uri/ =404;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy $zaochang_product_permissions_policy always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; media-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; worker-src 'self' blob:" always;
    }

    location = /favicon.svg {
        auth_basic "Zaochang protected preview";
        auth_basic_user_file /etc/nginx/.htpasswd-zaochang;
        limit_req zone=zaochang_preview_static_per_ip burst=160 nodelay;
        limit_conn zaochang_preview_connections 128;

        root /opt/zaochang/current/dist/client;
        try_files /favicon.svg =404;
    }

    location / {
        auth_basic "Zaochang protected preview";
        auth_basic_user_file /etc/nginx/.htpasswd-zaochang;
        limit_req zone=zaochang_preview_per_ip burst=100 nodelay;
        limit_conn zaochang_preview_connections 30;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
